name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ccr_user
          POSTGRES_PASSWORD: ccr_password
          POSTGRES_DB: quantum_stock_mlops
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      MONITORING_DATABASE_URL: postgresql+psycopg2://ccr_user:ccr_password@localhost:5432/quantum_stock_mlops

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install CPU-only torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install remaining dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check src tests

      - name: Run data pipeline + inference tests
        run: pytest tests/test_data_pipeline.py tests/test_inference.py -v

      - name: Run model tests (LSTM + QLSTM forward/backward)
        run: pytest tests/test_models.py -v

      - name: Run storage tests (real Postgres via service container)
        run: pytest tests/test_storage.py -v

      - name: Run drift detection tests
        run: pytest tests/test_drift.py -v

      - name: Run API tests
        run: pytest tests/test_api.py -v

      - name: Validate notebook structure
        run: |
          python -c "
          import nbformat
          nb = nbformat.read('notebooks/demo.ipynb', as_version=4)
          nbformat.validate(nb)
          print('notebook OK,', len(nb.cells), 'cells')
          "

  build:
    runs-on: ubuntu-latest
    needs: test
    # Only build+publish on actual merges to main, not every PR -- and only
    # once tests pass. This is CD-lite: it proves both images actually
    # build and publishes them to GHCR (free, tied to this repo, no
    # external credentials needed beyond the auto-provided GITHUB_TOKEN),
    # but doesn't deploy anywhere yet -- that step gets added once a
    # hosting target (Render/Fly/ECS) is chosen.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-backend:latest,ghcr.io/${{ github.repository }}-backend:${{ github.sha }}

      - name: Build and push MLflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mlflow.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-mlflow:latest,ghcr.io/${{ github.repository }}-mlflow:${{ github.sha }}
