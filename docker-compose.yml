services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ccr_user
      POSTGRES_PASSWORD: ccr_password
      POSTGRES_DB: quantum_stock_mlops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccr_user -d quantum_stock_mlops"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow-artifacts
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MONITORING_DATABASE_URL: postgresql+psycopg2://ccr_user:ccr_password@postgres:5432/quantum_stock_mlops
      MLFLOW_TRACKING_URI: http://mlflow:5000
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-local-dev-token}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  mlflow_artifacts:
